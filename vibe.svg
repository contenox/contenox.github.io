<?xml version="1.0" encoding="UTF-8"?>
<!--
  Contenox icon — modernized node routing mark.
  Concept: the original logo.png, re-executed with the current palette.
  Emerald nodes = active tasks. White nodes = intermediate steps.
  Routing lines = the chain/plan connecting them.
-->
<svg width="512" height="512" viewBox="0 0 512 512"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-labelledby="title">
  <title id="title">contenox</title>

  <!-- Background — warm near-black, slight green tint -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0c1410"/>

  <!--
    Node layout — inspired by original logo.png routing structure.
    Three horizontal "lanes" loosely staggered, connected by right-angle traces.
    Nodes vary in size to show hierarchy (larger = more connections / more active).
  -->

  <!-- ── Routing lines (behind nodes) ──────────────────────────────────────── -->
  <g stroke="#1f3828" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top lane connections -->
    <polyline points="138,168 200,168 200,220 275,220"/>
    <polyline points="275,168 275,220"/>
    <polyline points="275,168 338,168 338,220 390,220"/>

    <!-- Mid lane connections -->
    <polyline points="108,256 175,256"/>
    <polyline points="175,256 175,220 200,220"/>
    <polyline points="175,256 175,290 240,290 240,256 310,256"/>
    <polyline points="310,256 310,220 338,220"/>
    <polyline points="310,256 370,256"/>

    <!-- Bottom lane connections -->
    <polyline points="155,330 240,330 240,290"/>
    <polyline points="240,330 310,330 310,290 370,290 370,256"/>
    <polyline points="155,330 155,290 175,290"/>

    <!-- Cross connections for the "complex close up" feel -->
    <polyline points="200,220 240,220 240,256"/>
    <polyline points="338,220 370,220 370,256"/>
    <line x1="275" y1="220" x2="310" y2="220"/>
    <line x1="240" y1="290" x2="240" y2="330"/>
  </g>

  <!-- ── Nodes ──────────────────────────────────────────────────────────────── -->

  <!-- Top lane — smaller accent nodes -->
  <rect x="116" y="146" width="44" height="44" rx="10" fill="#1a2e22"/>
  <rect x="118" y="148" width="40" height="40" rx="9" fill="#e8f0ec"/>

  <rect x="253" y="146" width="44" height="44" rx="10" fill="#10b981"/>

  <rect x="316" y="146" width="44" height="44" rx="10" fill="#1a2e22"/>
  <rect x="318" y="148" width="40" height="40" rx="9" fill="#e8f0ec"/>
